<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - Retail MS</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body id="products-page">
    <div id="toast-container"></div>
    <div id="modal-container"></div>
    <nav class="navbar">
        <a href="/" class="nav-brand">Retail MS</a>
        <div class="global-search-container" id="global-search-container">
            <input type="search" id="global-search-bar" placeholder="Search anything...">
            <div id="global-search-results" class="global-search-results-box"></div>
        </div>
        <div class="nav-actions">
            <button class="primary-btn small-btn" id="quick-add-product-btn"><i class="fa-solid fa-plus"></i> Quick Add</button>
            <div class="notification-container">
                <i class="fa-solid fa-bell" id="notification-bell"></i>
                <span class="notification-badge" id="notification-badge" style="display:none;"></span>
                <div class="notification-dropdown" id="notification-dropdown">
                    <div class="notification-header">
                        <span>Notifications</span>
                        <button id="mark-all-read-btn">Mark all as read</button>
                    </div>
                    <ul id="notification-list"></ul>
                </div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/products" class="active">Products</a></li>
            <li><a href="/customers">Customers</a></li>
            <li><a href="/suppliers">Suppliers</a></li>
            <li><a href="/purchase-orders">Purchase Orders</a></li>
            <li><a href="/pos">Point of Sale</a></li>
            <li><a href="/sales">Sales</a></li>
            <li><a href="/expenses">Expenses</a></li>
            <li><a href="/stock">Stock Mgt.</a></li>
            <li><a href="/adjustments">Adjustments</a></li>
            <li><a href="/reports">Reports</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>
    <main class="page-grid">
        <section class="card">
            <h2 id="product-form-title">Add New Product</h2>
            <form id="product-form">
                <input type="hidden" id="product-id" name="id">
                <div class="form-group">
                    <label for="product-name">Product Name:</label>
                    <input type="text" id="product-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="product-barcode">Barcode / SKU:</label>
                    <input type="text" id="product-barcode" name="barcode">
                    <small id="barcode-warning" class="text-danger" style="display:none;"></small>
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="product-cost">Cost Price:</label>
                        <input type="number" id="product-cost" name="cost" step="0.01" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="product-price">Selling Price:</label>
                        <input type="number" id="product-price" name="price" step="0.01" required min="0">
                    </div>
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="product-quantity">Initial Quantity:</label>
                        <input type="number" id="product-quantity" name="quantity" step="0.001" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="product-unit">Unit:</label>
                        <select id="product-unit" name="unit" required>
                            <option value="pcs">Pieces (pcs)</option>
                            <option value="kg">Kilograms (kg)</option>
                            <option value="Ltr">Liters (Ltr)</option>
                        </select>
                    </div>
                </div>
                 <div class="form-group-row">
                    <div class="form-group">
                        <label for="product-category">Category:</label>
                        <select id="product-category-form" name="category" required></select>
                    </div>
                    <div class="form-group">
                         <button type="button" id="add-category-btn" class="secondary-btn" style="margin-top:28px; width:100%;">New Category</button>
                    </div>
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="product-reorder-threshold">Reorder Threshold:</label>
                        <input type="number" id="product-reorder-threshold" name="reorderThreshold" step="1" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="product-expiry">Expiry Date:</label>
                        <input type="date" id="product-expiry" name="expiryDate">
                    </div>
                </div>
                <div class="form-group">
                    <label for="product-image">Product Image:</label>
                    <input type="file" id="product-image" name="image" accept="image/*">
                    <img id="image-preview" src="" alt="Image Preview" class="image-preview-box">
                </div>
                <div class="form-actions">
                    <button type="submit" id="product-submit-btn" class="primary-btn">Add Product</button>
                    <button type="button" id="cancel-edit-btn" class="secondary-btn" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </section>
        <section class="card">
            <div class="page-header">
                <h2>Inventory</h2>
                 <div class="header-actions">
                    <input type="search" id="product-search-filter" placeholder="Search by name, SKU..." class="form-control">
                    <button id="export-products-btn" class="secondary-btn">Export to CSV</button>
                </div>
            </div>
             <div class="filters-bar">
                <select id="product-category-filter" class="form-control">
                    <option value="all">All Categories</option>
                </select>
                <div class="checkbox-group">
                    <input type="checkbox" id="low-stock-filter">
                    <label for="low-stock-filter">Low Stock</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="out-of-stock-filter">
                    <label for="out-of-stock-filter">Out of Stock</label>
                </div>
                 <button id="apply-filters-btn" class="primary-btn">Apply</button>
            </div>
            <div id="product-loader" class="loader-container"><div class="loader"></div></div>
            <table id="product-list-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>In Stock</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-list-body"></tbody>
            </table>
            <div class="pagination-controls" id="product-pagination"></div>
        </section>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
