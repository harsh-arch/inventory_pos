<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales - Retail MS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body id="sales-page">
    <div id="toast-container"></div>
    <div id="modal-container"></div>
    <nav class="navbar">
        <a href="/" class="nav-brand">Retail MS</a>
        <div class="global-search-container" id="global-search-container">
            <input type="search" id="global-search-bar" placeholder="Search anything...">
            <div id="global-search-results" class="global-search-results-box"></div>
        </div>
        <div class="nav-actions">
            <button class="primary-btn small-btn" id="quick-add-product-btn"><i class="fa-solid fa-plus"></i> Quick Add</button>
            <div class="notification-container">
                <i class="fa-solid fa-bell" id="notification-bell"></i>
                <span class="notification-badge" id="notification-badge" style="display:none;"></span>
                <div class="notification-dropdown" id="notification-dropdown">
                    <div class="notification-header">
                        <span>Notifications</span>
                        <button id="mark-all-read-btn">Mark all as read</button>
                    </div>
                    <ul id="notification-list"></ul>
                </div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/products">Products</a></li>
            <li><a href="/customers">Customers</a></li>
            <li><a href="/suppliers">Suppliers</a></li>
            <li><a href="/purchase-orders">Purchase Orders</a></li>
            <li><a href="/pos">Point of Sale</a></li>
            <li><a href="/sales" class="active">Sales</a></li>
            <li><a href="/expenses">Expenses</a></li>
            <li><a href="/stock">Stock Mgt.</a></li>
            <li><a href="/adjustments">Adjustments</a></li>
            <li><a href="/reports">Reports</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>
    <main>
        <div class="card">
            <div class="page-header">
                <h2>Sales History</h2>
                 <div class="header-actions">
                     <div class="date-filter">
                        <label for="sales-start-date">From:</label>
                        <input type="date" id="sales-start-date">
                        <label for="sales-end-date">To:</label>
                        <input type="date" id="sales-end-date">
                    </div>
                    <button id="daily-summary-btn" class="secondary-btn">Daily Summary</button>
                    <button id="export-sales-btn" class="primary-btn">Export to CSV</button>
                </div>
            </div>
            <div id="sales-loader" class="loader-container"><div class="loader"></div></div>
            <table id="sales-list-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date & Time</th>
                        <th>Customer</th>
                        <th>Payment</th>
                        <th>Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="sales-list-body"></tbody>
            </table>
            <div class="pagination-controls" id="sales-pagination"></div>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
